name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build --if-present

      - name: Detect meaningful test script
        id: test_script
        run: |
          TEST_ENABLED=$(node -e "const t=require('./package.json').scripts?.test; process.stdout.write(String(Boolean(t) && !t.includes('no test specified')))")
          echo "enabled=$TEST_ENABLED" >> "$GITHUB_OUTPUT"

      - name: Run tests
        if: steps.test_script.outputs.enabled == 'true'
        run: npm test

      - name: Skip tests notice
        if: steps.test_script.outputs.enabled != 'true'
        run: echo "No meaningful test script configured; skipping tests."
